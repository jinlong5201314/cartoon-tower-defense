<script>
const GAME_WIDTH = 960, GAME_HEIGHT = 640;
const INITIAL_GOLD = 200, INITIAL_LIVES = 20;
const MIN_TOWER_DIST = 40, PATH_ZONE = 30;
const PATH_POINTS = [
  {x:0,y:300},{x:150,y:300},{x:150,y:150},{x:400,y:150},

  arrow:{key:'arrow',name:'箭塔',cost:50,damage:15,range:120,fireRate:2,color:0x4CAF50,emoji:'🏹',desc:'快速单体攻击',upgrades:[{damage:25,range:140,cost:40},{damage:40,range:160,cost:80}]},

  poison:{key:'poison',name:'毒塔',cost:70,damage:5,range:100,fireRate:1,color:0x9C27B0,emoji:'☠️',desc:'持续毒伤',upgrades:[{damage:8,range:120,cost:55},{damage:12,range:140,cost:110}]},
  lightning:{key:'lightning',name:'电塔',cost:100,damage:30,range:130,fireRate:0.6,color:0xFFEB3B,emoji:'⚡',desc:'链式闪电',upgrades:[{damage:45,range:150,cost:80},{damage:65,range:170,cost:150}]},

  {enemies:[{type:'normal',count:8,interval:1000}]},
  {enemies:[{type:'normal',count:10,interval:900},{type:'fast',count:3,interval:800}]},
  {enemies:[{type:'normal',count:8,interval:800},{type:'fast',count:5,interval:700}]},
  {enemies:[{type:'tank',count:3,interval:2000},{type:'normal',count:10,interval:800}]},
  {enemies:[{type:'normal',count:5,interval:600},{type:'fast',count:5,interval:500},{type:'boss',count:1,interval:3000}]},
  {enemies:[{type:'tank',count:5,interval:1500},{type:'fast',count:8,interval:600}]},
  {enemies:[{type:'flying',count:8,interval:800},{type:'normal',count:10,interval:700}]},
  {enemies:[{type:'tank',count:4,interval:1500},{type:'flying',count:6,interval:800},{type:'boss',count:1,interval:2000}]},
  {enemies:[{type:'fast',count:15,interval:400},{type:'tank',count:6,interval:1200}]},
  {enemies:[{type:'normal',count:15,interval:500},{type:'tank',count:5,interval:1000},{type:'flying',count:8,interval:700},{type:'boss',count:2,interval:3000}]},

class PathSystem{constructor(){this.points=PATH_POINTS;this.segLens=[];this.totalLen=0;for(let i=1;i<this.points.length;i++){const dx=this.points[i].x-this.points[i-1].x;const dy=this.points[i].y-this.points[i-1].y;const len=Math.sqrt(dx*dx+dy*dy);this.segLens.push(len);this.totalLen+=len}}getPos(dist){if(dist<=0)return{...this.points[0]};if(dist>=this.totalLen)return{...this.points[this.points.length-1]};let rem=dist;for(let i=0;i<this.segLens.length;i++){if(rem<=this.segLens[i]){const t=rem/this.segLens[i];return{x:this.points[i].x+(this.points[i+1].x-this.points[i].x)*t,y:this.points[i].y+(this.points[i+1].y-this.points[i].y)*t}}rem-=this.segLens[i]}return{...this.points[this.points.length-1]}}isNearPath(x,y,threshold){for(let i=0;i<this.points.length-1;i++){if(this.ptSegDist(x,y,this.points[i],this.points[i+1])<threshold)return true}return false}ptSegDist(px,py,a,b){const dx=b.x-a.x,dy=b.y-a.y,lenSq=dx*dx+dy*dy;if(!lenSq)return Math.hypot(px-a.x,py-a.y);let t=((px-a.x)*dx+(py-a.y)*dy)/lenSq;t=Math.max(0,Math.min(1,t));return Math.hypot(px-(a.x+t*dx),py-(a.y+t*dy))}draw(gfx){gfx.lineStyle(40,0xb8956a,0.5);gfx.beginPath();gfx.moveTo(this.points[0].x,this.points[0].y);for(let i=1;i<this.points.length;i++)gfx.lineTo(this.points[i].x,this.points[i].y);gfx.strokePath();gfx.lineStyle(36,0xd4a574,1);gfx.beginPath();gfx.moveTo(this.points[0].x,this.points[0].y);for(let i=1;i<this.points.length;i++)gfx.lineTo(this.points[i].x,this.points[i].y);gfx.strokePath();gfx.lineStyle(2,0xffffff,0.3);for(let d=0;d<this.totalLen;d+=20){const p1=this.getPos(d),p2=this.getPos(d+10);gfx.beginPath();gfx.moveTo(p1.x,p1.y);gfx.lineTo(p2.x,p2.y);gfx.strokePath()}}}
class Enemy{constructor(scene,config,pathSys){this.scene=scene;this.config=config;this.pathSys=pathSys;this.hp=config.hp;this.maxHp=config.hp;this.speed=config.speed;this.dist=0;this.alive=true;this.slowed=0;this.poisoned=0;this.poisonDmg=0;const pos=pathSys.getPos(0);this.container=scene.add.container(pos.x,pos.y).setDepth(10);this.body=scene.add.circle(0,0,config.size,config.color).setStrokeStyle(2,0xffffff,0.8);this.container.add(this.body);const s=config.size;this.container.add([scene.add.circle(-s*0.3,-s*0.2,s*0.2,0xffffff),scene.add.circle(s*0.3,-s*0.2,s*0.2,0xffffff),scene.add.circle(-s*0.25,-s*0.2,s*0.1,0x000000),scene.add.circle(s*0.35,-s*0.2,s*0.1,0x000000)]);this.hpBar=scene.add.graphics();this.container.add(this.hpBar);this.drawHp()}update(dt){if(!this.alive)return false;let spd=this.speed;if(this.slowed>0){spd*=0.4;this.slowed-=dt;this.body.setFillStyle(0x87CEEB)}else this.body.setFillStyle(this.config.color);if(this.poisoned>0){this.poisoned-=dt;this.takeDamage(this.poisonDmg*dt/1000)}this.dist+=spd*dt/1000;const pos=this.pathSys.getPos(this.dist);this.container.setPosition(pos.x,pos.y);if(this.dist>=this.pathSys.totalLen){this.destroy();return true}return false}takeDamage(amt){this.hp-=amt;this.drawHp();if(this.hp<=0){this.alive=false;this.scene.tweens.add({targets:this.container,scaleX:0,scaleY:0,alpha:0,duration:200,onComplete:()=>this.destroy()})}}applySlow(dur){this.slowed=Math.max(this.slowed,dur)}applyPoison(dur,dps){this.poisoned=Math.max(this.poisoned,dur);this.poisonDmg=Math.max(this.poisonDmg,dps)}drawHp(){this.hpBar.clear();const w=this.config.size*2,y=-this.config.size-8;this.hpBar.fillStyle(0x000000,0.6).fillRect(-w/2,y,w,4);const r=Math.max(0,this.hp/this.maxHp);this.hpBar.fillStyle(r>0.5?0x00ff00:r>0.25?0xffff00:0xff0000,1).fillRect(-w/2,y,w*r,4)}destroy(){this.alive=false;this.container.destroy()}}
class Tower{constructor(scene,config,x,y){this.scene=scene;this.config=config;this.x=x;this.y=y;this.level=0;this.cooldown=0;this.curDamage=config.damage;this.curRange=config.range;this.container=scene.add.container(x,y).setDepth(20);this.rangeCircle=scene.add.circle(0,0,config.range,config.color,0.08).setStrokeStyle(1,config.color,0.3).setVisible(false);this.container.add(this.rangeCircle);this.container.add(scene.add.circle(0,6,18,0x555555,0.6));this.container.add(scene.add.circle(0,0,16,config.color).setStrokeStyle(2,0xffffff,0.9));this.container.add(scene.add.text(0,0,config.emoji,{fontSize:'18px'}).setOrigin(0.5));this.lvlText=scene.add.text(10,-14,'',{fontSize:'10px',color:'#FFD700',fontStyle:'bold'}).setOrigin(0.5);this.container.add(this.lvlText);this.container.setSize(36,36).setInteractive();this.container.setScale(0);scene.tweens.add({targets:this.container,scaleX:1,scaleY:1,duration:300,ease:'Back.easeOut'})}update(dt,enemies){this.cooldown-=dt;if(this.cooldown>0)return;let target=null,minD=Infinity;for(const e of enemies){if(!e.alive)continue;const d=Math.hypot(e.container.x-this.x,e.container.y-this.y);if(d<=this.curRange&&d<minD){minD=d;target=e}}if(target){this.fire(target);this.cooldown=1000/this.config.fireRate}}fire(target){const bullet=this.scene.add.circle(this.x,this.y,4,this.config.color).setDepth(15);this.scene.tweens.add({targets:bullet,x:target.container.x,y:target.container.y,duration:150,onComplete:()=>{bullet.destroy();if(!target.alive)return;const scene=this.scene;switch(this.config.key){case'cannon':const tx=target.container.x,ty=target.container.y;scene.doAOE(tx,ty,60,this.curDamage);const exp=scene.add.circle(tx,ty,10,0xFF5722,0.8).setDepth(15);scene.tweens.add({targets:exp,scale:4,alpha:0,duration:300,onComplete:()=>exp.destroy()});break;case'ice':target.takeDamage(this.curDamage);target.applySlow(2000);break;case'poison':target.takeDamage(this.curDamage);target.applyPoison(3000,this.curDamage*0.8);break;case'lightning':scene.doChainLightning(target,this.curDamage,3);break;default:target.takeDamage(this.curDamage)}}})}upgrade(){if(this.level>=this.config.upgrades.length)return false;const u=this.config.upgrades[this.level];this.curDamage=u.damage;this.curRange=u.range;this.rangeCircle.setRadius(u.range);this.level++;this.lvlText.setText('★'.repeat(this.level));this.scene.tweens.add({targets:this.container,scaleX:1.3,scaleY:1.3,duration:150,yoyo:true});return true}getUpgCost(){return this.level>=this.config.upgrades.length?-1:this.config.upgrades[this.level].cost}showRange(v){this.rangeCircle.setVisible(v)}destroy(){this.container.destroy()}}
class WaveManager{constructor(scene,pathSys){this.scene=scene;this.pathSys=pathSys;this.curWave=0;this.enemies=[];this.spawning=false;this.waveComplete=true;this.queue=[];this.timer=0}startWave(){if(this.curWave>=WAVES.length)return false;const wave=WAVES[this.curWave];this.queue=[];let delay=0;for(const g of wave.enemies){for(let i=0;i<g.count;i++){this.queue.push({config:ENEMIES[g.type],delay});delay+=g.interval}}this.spawning=true;this.waveComplete=false;this.timer=0;this.curWave++;return true}update(dt){let reached=0,killed=0,reward=0;if(this.spawning&&this.queue.length){this.timer+=dt;while(this.queue.length&&this.timer>=this.queue[0].delay){const e=this.queue.shift();this.enemies.push(new Enemy(this.scene,e.config,this.pathSys));}if(!this.queue.length)this.spawning=false}for(let i=this.enemies.length-1;i>=0;i--){const e=this.enemies[i];if(!e.alive){reward+=e.config.reward;killed++;this.enemies.splice(i,1);continue}if(e.update(dt)){reached++;this.enemies.splice(i,1)}}if(!this.spawning&&!this.queue.length&&!this.enemies.length)this.waveComplete=true;return{reached,killed,reward}}get totalWaves(){return WAVES.length}}
const Leaderboard={KEY:'td_leaderboard',submit(entry){const entries=this.get();entries.push(entry);entries.sort((a,b)=>b.score-a.score);localStorage.setItem(this.KEY,JSON.stringify(entries.slice(0,100)))},get(){try{return JSON.parse(localStorage.getItem(this.KEY)||'[]')}catch{return[]}}};
class MenuScene extends Phaser.Scene{constructor(){super({key:'MenuScene'})}create(){this.cameras.main.setBackgroundColor(0x1a1a2e);this.add.text(GAME_WIDTH/2,120,'🏰 卡通塔防',{fontSize:'52px',color:'#FFD700',stroke:'#000',strokeThickness:8}).setOrigin(0.5);this.add.text(GAME_WIDTH/2,190,'Cartoon Tower Defense',{fontSize:'18px',color:'#aaa'}).setOrigin(0.5);const emojis=['🏹','💣','❄️','☠️','⚡','🐗','🐇','🐢'];emojis.forEach((e,i)=>{const x=100+(i%4)*220,y=260+Math.floor(i/4)*50;const t=this.add.text(x,y,e,{fontSize:'28px'}).setOrigin(0.5);this.tweens.add({targets:t,y:y-10,duration:800+i*200,yoyo:true,repeat:-1,ease:'Sine.easeInOut'})});const startBtn=this.add.text(GAME_WIDTH/2,400,'🎮 开始游戏',{fontSize:'28px',color:'#fff',backgroundColor:'#e74c3c',padding:{x:30,y:12}}).setOrigin(0.5).setInteractive({useHandCursor:true});startBtn.on('pointerdown',()=>this.scene.start('GameScene'));startBtn.on('pointerover',()=>startBtn.setStyle({backgroundColor:'#c0392b'}));startBtn.on('pointerout',()=>startBtn.setStyle({backgroundColor:'#e74c3c'}));const lbBtn=this.add.text(GAME_WIDTH/2,470,'🏆 排行榜',{fontSize:'20px',color:'#fff',backgroundColor:'#3498db',padding:{x:20,y:8}}).setOrigin(0.5).setInteractive({useHandCursor:true});lbBtn.on('pointerdown',()=>this.scene.start('LeaderboardScene'));this.add.text(GAME_WIDTH/2,550,'操作: 点击选塔→点击空地放置 | 点击塔升级/卖出 | 空格暂停 | ESC取消',{fontSize:'12px',color:'#666'}).setOrigin(0.5)}}
class GameScene extends Phaser.Scene{constructor(){super({key:'GameScene'})}create(){this.cameras.main.setBackgroundColor(0x2d5a1b);const grass=this.add.graphics();for(let i=0;i<200;i++){grass.fillStyle(0x2d5a1b+Math.floor(Math.random()*0x101010),0.3);grass.fillCircle(Math.random()*GAME_WIDTH,Math.random()*GAME_HEIGHT,5+Math.random()*15)}this.pathSys=new PathSystem();this.pathSys.draw(this.add.graphics());const sp=this.pathSys.points[0],ep=this.pathSys.points[this.pathSys.points.length-1];this.add.text(sp.x+10,sp.y-25,'🏁 入口',{fontSize:'12px',color:'#fff'});this.add.text(ep.x-60,ep.y-25,'🏠 基地',{fontSize:'12px',color:'#fff'});this.waveMgr=new WaveManager(this,this.pathSys);this.towers=[];this.gold=INITIAL_GOLD;this.lives=INITIAL_LIVES;this.score=0;this.selType=null;this.selTower=null;this.isOver=false;this.paused=false;this.speed=1;this.preview=this.add.container(0,0).setVisible(false).setDepth(50).setAlpha(0.6);this.previewRange=this.add.circle(0,0,100,0xffffff,0.1).setStrokeStyle(1,0xffffff,0.3);this.preview.add([this.previewRange,this.add.circle(0,0,16,0xffffff)]);this.createHUD();this.createTowerPanel();this.createUpgradePanel();this.input.on('pointermove',p=>{if(this.selType){this.preview.setPosition(p.x,p.y);this.preview.setAlpha(this.canPlace(p.x,p.y)?0.6:0.2)}});this.input.on('pointerdown',p=>{if(p.y>GAME_HEIGHT-80)return;if(this.selType){this.tryPlace(p.x,p.y);return}let clicked=null;for(const t of this.towers){if(Math.hypot(t.x-p.x,t.y-p.y)<24){clicked=t;break}}if(clicked){if(this.selTower)this.selTower.showRange(false);this.selTower=clicked;clicked.showRange(true);this.upgPanel.setPosition(clicked.x,clicked.y-55).setVisible(true);this.updateUpgPanel()}else this.cancelSel()});this.input.keyboard.on('keydown-ESC',()=>this.cancelSel());this.input.keyboard.on('keydown-SPACE',()=>{this.paused=!this.paused;this.showMsg(this.paused?'已暂停 (空格继续)':'继续！')});this.showMsg('选择防御塔放置，然后按 开始波次！')}update(_t,dt){if(this.isOver||this.paused)return;const d=dt*this.speed;for(const t of this.towers)t.update(d,this.waveMgr.enemies);const r=this.waveMgr.update(d);if(r.reward){this.gold+=r.reward;this.score+=r.reward}if(r.reached){this.lives-=r.reached;this.cameras.main.shake(200,0.01);if(this.lives<=0){this.lives=0;this.endGame()}}if(this.waveMgr.waveComplete&&this.waveMgr.curWave>0&&this.waveMgr.curWave>=this.waveMgr.totalWaves){this.score+=500;this.endGame(true)}this.goldTxt.setText('💰 金币: '+this.gold);this.livesTxt.setText('❤️ 生命: '+this.lives);this.waveTxt.setText('🌊 波次: '+this.waveMgr.curWave+'/'+this.waveMgr.totalWaves);this.scoreTxt.setText('⭐ 分数: '+this.score)}doAOE(x,y,radius,dmg){for(const e of this.waveMgr.enemies){if(e.alive&&Math.hypot(e.container.x-x,e.container.y-y)<=radius)e.takeDamage(dmg)}}doChainLightning(target,dmg,chains){const hit=new Set();let cur=target;for(let i=0;i<chains;i++){if(!cur.alive)break;cur.takeDamage(dmg*(1-i*0.2));hit.add(cur);let next=null,minD=80;for(const e of this.waveMgr.enemies){if(!e.alive||hit.has(e))continue;const d=Math.hypot(e.container.x-cur.container.x,e.container.y-cur.container.y);if(d<minD){minD=d;next=e}}if(!next)break;const lg=this.add.graphics().setDepth(15);lg.lineStyle(2,0xFFEB3B,0.8);lg.beginPath();lg.moveTo(cur.container.x,cur.container.y);lg.lineTo(next.container.x,next.container.y);lg.strokePath();this.time.delayedCall(200,()=>lg.destroy());cur=next}}createHUD(){const s={fontSize:'16px',color:'#ffffff',stroke:'#000',strokeThickness:3};this.goldTxt=this.add.text(10,10,'',s).setDepth(100);this.livesTxt=this.add.text(10,35,'',s).setDepth(100);this.waveTxt=this.add.text(10,60,'',s).setDepth(100);this.scoreTxt=this.add.text(10,85,'',s).setDepth(100);this.msgTxt=this.add.text(GAME_WIDTH/2,GAME_HEIGHT/2-50,'',{fontSize:'20px',color:'#FFD700',stroke:'#000',strokeThickness:4,align:'center'}).setOrigin(0.5).setDepth(100).setAlpha(0);const startBtn=this.add.text(GAME_WIDTH-10,10,'▶ 开始波次',{fontSize:'16px',color:'#fff',backgroundColor:'#e74c3c',padding:{x:12,y:6}}).setOrigin(1,0).setDepth(100).setInteractive({useHandCursor:true});startBtn.on('pointerdown',()=>{if(this.waveMgr.waveComplete&&!this.isOver){if(this.waveMgr.startWave())this.showMsg('第 '+this.waveMgr.curWave+' 波！')}});startBtn.on('pointerover',()=>startBtn.setStyle({backgroundColor:'#c0392b'}));startBtn.on('pointerout',()=>startBtn.setStyle({backgroundColor:'#e74c3c'}));this.speedBtn=this.add.text(GAME_WIDTH-10,50,'⏩ x1',{fontSize:'14px',color:'#fff',backgroundColor:'#3498db',padding:{x:8,y:4}}).setOrigin(1,0).setDepth(100).setInteractive({useHandCursor:true});this.speedBtn.on('pointerdown',()=>{this.speed=this.speed===1?2:this.speed===2?3:1;this.speedBtn.setText('⏩ x'+this.speed)})}createTowerPanel(){this.towerPanel=this.add.container(0,GAME_HEIGHT-80).setDepth(100);this.towerPanel.add(this.add.rectangle(GAME_WIDTH/2,40,GAME_WIDTH,80,0x000000,0.7));const keys=Object.keys(TOWERS);const sx=GAME_WIDTH/2-(keys.length*100)/2+50;keys.forEach((k,i)=>{const c=TOWERS[k],x=sx+i*100,btn=this.add.container(x,40);const bg=this.add.rectangle(0,0,90,65,0x333333,0.9).setStrokeStyle(2,c.color).setInteractive({useHandCursor:true});btn.add([bg,this.add.text(0,-12,c.emoji,{fontSize:'22px'}).setOrigin(0.5),this.add.text(0,8,c.name,{fontSize:'11px',color:'#fff'}).setOrigin(0.5),this.add.text(0,22,'💰'+c.cost,{fontSize:'10px',color:'#FFD700'}).setOrigin(0.5)]);this.towerPanel.add(btn);bg.on('pointerdown',()=>{this.cancelSel();if(this.gold>=c.cost){this.selType=k;this.preview.setVisible(true);this.previewRange.setRadius(c.range)}else this.showMsg('金币不足！')});bg.on('pointerover',()=>{bg.setFillStyle(0x555555);this.showMsg(c.name+': '+c.desc+' | 伤害:'+c.damage+' 射程:'+c.range)});bg.on('pointerout',()=>bg.setFillStyle(0x333333))})}createUpgradePanel(){this.upgPanel=this.add.container(0,0).setDepth(110).setVisible(false);this.upgPanel.add(this.add.rectangle(0,0,140,70,0x000000,0.85).setStrokeStyle(1,0xffffff,0.5));this.upgCostTxt=this.add.text(0,-28,'',{fontSize:'10px',color:'#aaa'}).setOrigin(0.5);const uBtn=this.add.text(0,-10,'⬆ 升级',{fontSize:'13px',color:'#FFD700',backgroundColor:'#2d5a1b',padding:{x:8,y:3}}).setOrigin(0.5).setInteractive({useHandCursor:true});const sBtn=this.add.text(0,15,'💰 卖出',{fontSize:'13px',color:'#ff6b6b',backgroundColor:'#333',padding:{x:8,y:3}}).setOrigin(0.5).setInteractive({useHandCursor:true});this.upgPanel.add([this.upgCostTxt,uBtn,sBtn]);uBtn.on('pointerdown',()=>{if(!this.selTower)return;const cost=this.selTower.getUpgCost();if(cost>0&&this.gold>=cost){this.gold-=cost;this.selTower.upgrade();this.updateUpgPanel()}else this.showMsg(cost<0?'已满级！':'金币不足！')});sBtn.on('pointerdown',()=>{if(!this.selTower)return;this.gold+=Math.floor(this.selTower.config.cost*0.6);this.towers.splice(this.towers.indexOf(this.selTower),1);this.selTower.destroy();this.selTower=null;this.upgPanel.setVisible(false)})}updateUpgPanel(){if(!this.selTower)return;const c=this.selTower.getUpgCost();this.upgCostTxt.setText(c>0?'升级: 💰'+c:'已满级')}showMsg(t){this.msgTxt.setText(t).setAlpha(1);this.tweens.killTweensOf(this.msgTxt);this.tweens.add({targets:this.msgTxt,alpha:0,delay:2000,duration:500})}cancelSel(){this.selType=null;this.preview.setVisible(false);if(this.selTower){this.selTower.showRange(false);this.selTower=null}this.upgPanel.setVisible(false)}canPlace(x,y){if(y>GAME_HEIGHT-80)return false;if(this.pathSys.isNearPath(x,y,PATH_ZONE))return false;for(const t of this.towers)if(Math.hypot(t.x-x,t.y-y)<MIN_TOWER_DIST)return false;return true}tryPlace(x,y){if(!this.selType||!this.canPlace(x,y))return;const c=TOWERS[this.selType];if(this.gold<c.cost){this.showMsg('金币不足！');return}this.gold-=c.cost;this.towers.push(new Tower(this,c,x,y));this.cancelSel()}endGame(victory=false){this.isOver=true;this.score+=this.lives*10;this.add.rectangle(GAME_WIDTH/2,GAME_HEIGHT/2,GAME_WIDTH,GAME_HEIGHT,0x000000,0.7).setDepth(200);this.add.text(GAME_WIDTH/2,130,victory?'🎉 胜利！':'💀 失败！',{fontSize:'48px',color:victory?'#FFD700':'#ff4444',stroke:'#000',strokeThickness:6}).setOrigin(0.5).setDepth(200);this.add.text(GAME_WIDTH/2,230,'最终分数: '+this.score+'\n存活波次: '+this.waveMgr.curWave+'\n剩余生命: '+this.lives+'\n防御塔数: '+this.towers.length,{fontSize:'20px',color:'#fff',align:'center',lineSpacing:8}).setOrigin(0.5).setDepth(200);const name=prompt('输入你的名字 (排行榜):')||'匿名玩家';Leaderboard.submit({playerName:name,score:this.score,wave:this.waveMgr.curWave,timestamp:Date.now()});const rb=this.add.text(GAME_WIDTH/2-80,380,'🔄 重新开始',{fontSize:'18px',color:'#fff',backgroundColor:'#2ecc71',padding:{x:12,y:8}}).setOrigin(0.5).setDepth(200).setInteractive({useHandCursor:true});rb.on('pointerdown',()=>this.scene.restart());const lb=this.add.text(GAME_WIDTH/2+80,380,'🏆 排行榜',{fontSize:'18px',color:'#fff',backgroundColor:'#3498db',padding:{x:12,y:8}}).setOrigin(0.5).setDepth(200).setInteractive({useHandCursor:true});lb.on('pointerdown',()=>this.scene.start('LeaderboardScene'))}}
class LeaderboardScene extends Phaser.Scene{constructor(){super({key:'LeaderboardScene'})}create(){this.cameras.main.setBackgroundColor(0x1a1a2e);this.add.text(GAME_WIDTH/2,40,'🏆 排行榜',{fontSize:'36px',color:'#FFD700',stroke:'#000',strokeThickness:4}).setOrigin(0.5);const entries=Leaderboard.get().slice(0,10);if(!entries.length){this.add.text(GAME_WIDTH/2,GAME_HEIGHT/2,'暂无记录，去玩一局吧！',{fontSize:'20px',color:'#aaa'}).setOrigin(0.5)}else{this.add.text(100,90,'排名',{fontSize:'14px',color:'#888'});this.add.text(200,90,'玩家',{fontSize:'14px',color:'#888'});this.add.text(450,90,'分数',{fontSize:'14px',color:'#888'});this.add.text(600,90,'波次',{fontSize:'14px',color:'#888'});entries.forEach((e,i)=>{const y=120+i*40;const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':''+(i+1);const c=i<3?'#FFD700':'#fff';this.add.text(100,y,medal,{fontSize:'18px',color:c});this.add.text(200,y,e.playerName,{fontSize:'16px',color:'#fff'});this.add.text(450,y,''+e.score,{fontSize:'16px',color:'#FFD700'});this.add.text(600,y,'第'+e.wave+'波',{fontSize:'16px',color:'#aaa'})})}const bb=this.add.text(GAME_WIDTH/2,GAME_HEIGHT-60,'🔙 返回主菜单',{fontSize:'20px',color:'#fff',backgroundColor:'#555',padding:{x:16,y:8}}).setOrigin(0.5).setInteractive({useHandCursor:true});bb.on('pointerdown',()=>this.scene.start('MenuScene'))}}
new Phaser.Game({type:Phaser.AUTO,width:GAME_WIDTH,height:GAME_HEIGHT,parent:document.body,backgroundColor:'#1a1a2e',scene:[MenuScene,GameScene,LeaderboardScene],scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH}});
